spring:
  application:
    name: auth-service

  main:
    banner-mode: off

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/auth_user_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:Jagadish@99}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: ${JWT_SECRET:change-me-in-production-min-32-chars}
  expiration: ${JWT_EXPIRATION:360000}
